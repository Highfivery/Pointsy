name: E2E

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (mobile + desktop) + axe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E + accessibility checks
        run: npm run test:e2e
        env:
          CI: "true"
          # The current E2E flows hit only static, non-DB pages. When flows that
          # touch the database are added, provision a Neon branch here (via the
          # neondatabase/create-branch-action) and pass its pooled URL instead.
          DATABASE_URL: postgres://user:pass@localhost:5432/pointsy
          AUTH_SECRET: ci-placeholder-secret-at-least-32-characters-long

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
