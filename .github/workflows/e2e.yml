name: E2E

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (mobile + desktop) + axe
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pointsy
          POSTGRES_PASSWORD: pointsy
          POSTGRES_DB: pointsy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Standard Postgres service → the app uses the node-postgres driver
      # (auto-selected for non-Neon URLs). No external credentials needed.
      DATABASE_URL: postgres://pointsy:pointsy@localhost:5432/pointsy
      AUTH_SECRET: ci-placeholder-secret-at-least-32-characters-long

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E + accessibility checks
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
