name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version (Changesets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      # Opens/updates a "Version Packages" PR that applies pending changesets,
      # bumps the version, and updates CHANGELOG.md. Merging it cuts a release.
      # (No npm publish — Pointsy is a deployed app, not a package.)
      - name: Create release pull request
        uses: changesets/action@v1
        with:
          version: npm run version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
