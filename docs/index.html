<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Pointsy now lives at its own domain. This GitHub Pages site redirects
         there. An instant (0s) meta refresh is treated by Google as a permanent
         redirect; the canonical + visible link cover crawlers/clients that don't
         follow it. (GitHub Pages can't emit a real HTTP 301.) -->
    <meta http-equiv="refresh" content="0; url=https://pointsy.kids/" />
    <link rel="canonical" href="https://pointsy.kids/" />
    <meta name="robots" content="noindex, follow" />
    <title>Pointsy has moved to pointsy.kids</title>
    <script>
      window.location.replace("https://pointsy.kids/");
    </script>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #04130e;
        background-image: radial-gradient(
          130% 120% at 50% -10%,
          #06231a 0%,
          #04130e 48%,
          #02100b 100%
        );
        color: #ecfdf5;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .mark {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #34d399, #22d3ee);
        color: #03251b;
        font-weight: 800;
        font-size: 2.2rem;
        display: grid;
        place-items: center;
        margin: 0 auto 20px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }
      p {
        color: #9fcdbb;
        margin: 0 0 20px;
      }
      a.btn {
        display: inline-block;
        padding: 12px 22px;
        border-radius: 999px;
        background: linear-gradient(135deg, #34d399, #22d3ee);
        color: #03251b;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">P</div>
      <h1>Pointsy has a new home</h1>
      <p>We’ve moved to <strong>pointsy.kids</strong>. Redirecting you now…</p>
      <a class="btn" href="https://pointsy.kids/">Go to pointsy.kids</a>
    </main>
  </body>
</html>
